<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dot grid pattern -->
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="0.9" fill="#1c2333"/>
    </pattern>

    <!-- Center node gradient -->
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#072233;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1"/>
    </linearGradient>

    <!-- Branch node gradient -->
    <linearGradient id="branchGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081c2d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1"/>
    </linearGradient>

    <!-- Radial glow behind center -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:0.055"/>
      <stop offset="100%" style="stop-color:#00D9FF;stop-opacity:0"/>
    </radialGradient>

    <!-- Center box glow filter -->
    <filter id="centerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for branch headers -->
    <filter id="branchGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="900" height="520" fill="#0d1117" rx="14"/>
  <rect width="900" height="520" fill="url(#dots)" rx="14"/>
  <!-- Radial glow overlay -->
  <rect width="900" height="520" fill="url(#bgGlow)" rx="14"/>
  <!-- Outer border -->
  <rect x="1" y="1" width="898" height="518" fill="none" stroke="#21262d" stroke-width="1.5" rx="13"/>
  <!-- Top cyan accent bar -->
  <rect x="0" y="0" width="900" height="3" fill="#00D9FF" rx="2" opacity="0.9"/>

  <!-- ─── Corner Decorators ─── -->
  <rect x="16" y="16" width="20" height="2" fill="#00D9FF" opacity="0.4" rx="1"/>
  <rect x="16" y="16" width="2" height="20" fill="#00D9FF" opacity="0.4" rx="1"/>
  <rect x="864" y="16" width="20" height="2" fill="#00D9FF" opacity="0.4" rx="1"/>
  <rect x="882" y="16" width="2" height="20" fill="#00D9FF" opacity="0.4" rx="1"/>
  <rect x="16" y="502" width="20" height="2" fill="#00D9FF" opacity="0.4" rx="1"/>
  <rect x="16" y="482" width="2" height="20" fill="#00D9FF" opacity="0.4" rx="1"/>
  <rect x="864" y="502" width="20" height="2" fill="#00D9FF" opacity="0.4" rx="1"/>
  <rect x="882" y="482" width="2" height="20" fill="#00D9FF" opacity="0.4" rx="1"/>

  <!-- ─── Connector Lines (dashed, faint cyan) ─── -->
  <!-- To Skills (top-left) -->
  <path d="M 360,243 C 318,188 276,138 236,103" stroke="#00D9FF" stroke-width="1.4" fill="none" stroke-opacity="0.3" stroke-dasharray="5,4"/>
  <!-- To Projects (top-right) -->
  <path d="M 540,243 C 582,188 624,138 664,103" stroke="#00D9FF" stroke-width="1.4" fill="none" stroke-opacity="0.3" stroke-dasharray="5,4"/>
  <!-- To Career (bottom-left) -->
  <path d="M 360,287 C 318,332 276,372 236,390" stroke="#00D9FF" stroke-width="1.4" fill="none" stroke-opacity="0.3" stroke-dasharray="5,4"/>
  <!-- To Learning (bottom-right) -->
  <path d="M 540,287 C 582,332 624,372 664,390" stroke="#00D9FF" stroke-width="1.4" fill="none" stroke-opacity="0.3" stroke-dasharray="5,4"/>

  <!-- Connector endpoint dots -->
  <circle cx="360" cy="243" r="3" fill="#00D9FF" opacity="0.5"/>
  <circle cx="540" cy="243" r="3" fill="#00D9FF" opacity="0.5"/>
  <circle cx="360" cy="287" r="3" fill="#00D9FF" opacity="0.5"/>
  <circle cx="540" cy="287" r="3" fill="#00D9FF" opacity="0.5"/>
  <circle cx="236" cy="103" r="3" fill="#00D9FF" opacity="0.5"/>
  <circle cx="664" cy="103" r="3" fill="#00D9FF" opacity="0.5"/>
  <circle cx="236" cy="390" r="3" fill="#00D9FF" opacity="0.5"/>
  <circle cx="664" cy="390" r="3" fill="#00D9FF" opacity="0.5"/>

  <!-- ─── CENTER NODE ─── -->
  <rect x="348" y="230" width="204" height="70" rx="11" fill="url(#centerGrad)" stroke="#00D9FF" stroke-width="1.8" filter="url(#centerGlow)"/>
  <!-- inner shimmer line -->
  <rect x="350" y="231" width="200" height="1" fill="#00D9FF" opacity="0.15" rx="1"/>
  <text x="450" y="256" text-anchor="middle"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="9.5" fill="#00D9FF" letter-spacing="3.5" font-weight="500" opacity="0.8">ROADMAP</text>
  <text x="450" y="285" text-anchor="middle"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="20" fill="#e6edf3" font-weight="700" letter-spacing="0.5">2026 Goals</text>

  <!-- ─── SKILLS (top-left) ─── -->
  <rect x="92" y="82" width="148" height="38" rx="8" fill="url(#branchGrad)" stroke="#00D9FF" stroke-width="1.2" filter="url(#branchGlow)"/>
  <text x="116" y="106"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="14" fill="#00D9FF" font-weight="600">💻 Skills</text>

  <!-- Skills items -->
  <circle cx="106" cy="140" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="116" y="144"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">DSA (C++)</text>

  <circle cx="106" cy="164" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="116" y="168"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">Problem Solving</text>

  <circle cx="106" cy="188" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="116" y="192"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">System Design Fundamentals</text>

  <!-- ─── PROJECTS (top-right) ─── -->
  <rect x="660" y="82" width="152" height="38" rx="8" fill="url(#branchGrad)" stroke="#00D9FF" stroke-width="1.2" filter="url(#branchGlow)"/>
  <text x="684" y="106"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="14" fill="#00D9FF" font-weight="600">🚀 Projects</text>

  <!-- Projects items -->
  <circle cx="674" cy="140" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="684" y="144"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">Develop PdfOrbit core features</text>

  <circle cx="674" cy="164" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="684" y="168"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">2–3 real-world tools</text>

  <circle cx="674" cy="188" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="684" y="192"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">Deployment experience</text>

  <!-- ─── CAREER (bottom-left) ─── -->
  <rect x="92" y="374" width="148" height="38" rx="8" fill="url(#branchGrad)" stroke="#00D9FF" stroke-width="1.2" filter="url(#branchGlow)"/>
  <text x="116" y="398"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="14" fill="#00D9FF" font-weight="600">📈 Career</text>

  <!-- Career items -->
  <circle cx="106" cy="428" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="116" y="432"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">Get Internship</text>

  <circle cx="106" cy="452" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="116" y="456"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">Strengthen GitHub portfolio</text>

  <circle cx="106" cy="476" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="116" y="480"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">Learn from real projects</text>

  <!-- ─── LEARNING (bottom-right) ─── -->
  <rect x="660" y="374" width="155" height="38" rx="8" fill="url(#branchGrad)" stroke="#00D9FF" stroke-width="1.2" filter="url(#branchGlow)"/>
  <text x="684" y="398"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="14" fill="#00D9FF" font-weight="600">🧠 Learning</text>

  <!-- Learning items -->
  <circle cx="674" cy="428" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="684" y="432"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">Backend Development</text>

  <circle cx="674" cy="452" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="684" y="456"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">APIs &amp; Databases</text>

  <circle cx="674" cy="476" r="2.5" fill="#00D9FF" opacity="0.65"/>
  <text x="684" y="480"
    font-family="'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="12.5" fill="#8b949e">AI basics (practical)</text>

</svg>
